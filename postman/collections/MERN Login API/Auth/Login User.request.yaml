$kind: http-request
description: "Login with email and password. Returns a JWT token and user
  details (name and email) on success. Returns success: false with an error
  message if credentials are invalid."
url: "{{baseUrl}}/api/login"
method: POST
headers:
  Content-Type: application/json
body:
  type: json
  content: |-
    {
      "email": "john@example.com",
      "password": "password123"
    }
scripts:
  - type: afterResponse
    code: |-
      if (pm.response.json().success) {
          pm.environment.set("token", pm.response.json().token);
      }
    language: text/javascript
examples: ./.resources/Login User.resources/examples
order: 2000
