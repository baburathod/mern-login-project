$kind: http-request
description: Register a new user. Requires name, email, and password. All three
  fields are required by the User schema — missing any field will return a 400
  validation error.
url: "{{baseUrl}}/api/register"
method: POST
headers:
  Content-Type: application/json
body:
  type: json
  content: |-
    {
      "name": "John Doe",
      "email": "john@example.com",
      "password": "password123"
    }
examples: ./.resources/Register User.resources/examples
order: 1000
