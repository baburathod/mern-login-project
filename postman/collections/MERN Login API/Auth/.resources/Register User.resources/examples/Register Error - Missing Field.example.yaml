$kind: http-example
request:
  url: "{{baseUrl}}/api/register"
  method: POST
  headers:
    Content-Type: application/json
  body:
    type: json
    content: |-
      {
        "name": "John Doe",
        "password": "password123"
      }
response:
  statusCode: 400
  statusText: Bad Request
  body:
    type: json
    content: |-
      {
        "message": "email: Path `email` is required."
      }
order: 2000
