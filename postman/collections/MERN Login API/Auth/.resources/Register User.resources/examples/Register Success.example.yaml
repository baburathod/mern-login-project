$kind: http-example
request:
  url: "{{baseUrl}}/api/register"
  method: POST
  headers:
    Content-Type: application/json
  body:
    type: json
    content: |-
      {
        "name": "John Doe",
        "email": "john@example.com",
        "password": "password123"
      }
response:
  statusCode: 200
  statusText: OK
  body:
    type: json
    content: |-
      {
        "message": "User registered successfully"
      }
order: 1000
