$kind: http-example
request:
  url: "{{baseUrl}}/api/login"
  method: POST
  headers:
    Content-Type: application/json
  body:
    type: json
    content: |-
      {
        "email": "john@example.com",
        "password": "wrongpassword"
      }
response:
  statusCode: 200
  statusText: OK
  body:
    type: json
    content: |-
      {
        "success": false,
        "message": "Invalid email or password"
      }
order: 2000
