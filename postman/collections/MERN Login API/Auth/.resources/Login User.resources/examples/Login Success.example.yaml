$kind: http-example
request:
  url: "{{baseUrl}}/api/login"
  method: POST
  headers:
    Content-Type: application/json
  body:
    type: json
    content: |-
      {
        "email": "john@example.com",
        "password": "password123"
      }
response:
  statusCode: 200
  statusText: OK
  body:
    type: json
    content: |-
      {
        "success": true,
        "token": "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9...",
        "user": {
          "name": "John Doe",
          "email": "john@example.com"
        }
      }
order: 1000
